spring.application.name=musicload-shorts-funnel
server.port=9099

musicload.openai-api-key=${OPENAI_API_KEY:}
musicload.whisper-language=${WHISPER_LANGUAGE:hi}
musicload.lyrics-correction-model=${LYRICS_CORRECTION_MODEL:gpt-4o-mini}
musicload.upload-dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=100MB
springdoc.swagger-ui.path=/swagger-ui.html
